<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Google Script</title>
    <style>
        /* Tetapan untuk membuang jidar (margin) dan menjadikan iframe sepenuh skrin */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Mengelakkan bar tatal ganda */
            background-color: #f4f4f9;
        }
        
        /* Gaya untuk iframe */
        .script-iframe {
            width: 100%;
            height: 100%;
            border: none; /* Membuang sempadan bingkai */
            display: block;
        }
    </style>
</head>
<body>

    <!-- Iframe yang membenamkan URL Google Script anda -->
    <iframe 
        class="script-iframe" 
        src="https://script.google.com/macros/s/AKfycbzwV6dc-FUIxbxSI8s8Z3OORXC1lmnXMip74n9txulNEpO-wFPvWyFo4hYvA-7FfMXn0g/exec" 
       </iframe>

</body>
</html>
